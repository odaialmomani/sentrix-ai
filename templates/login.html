<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SENTRIX AI — Sign In</title>
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="lp">
  <div class="lp-mesh"></div>
  <div class="lp-dots"></div>
  <canvas id="lp-canvas"></canvas>

  <div class="lp-card">
    <div class="lp-logo">
      <svg class="lp-icon" width="60" height="60" viewBox="0 0 64 64" fill="none">
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#1d6bf3"/>
            <stop offset="100%" stop-color="#a855f7"/>
          </linearGradient>
          <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#22d3ee"/>
            <stop offset="100%" stop-color="#1d6bf3"/>
          </linearGradient>
        </defs>
        <path d="M32 3 L58 13 L58 35 C58 49 45 58 32 62 C19 58 6 49 6 35 L6 13 Z" fill="url(#g1)" opacity=".95"/>
        <path d="M32 10 L52 18 L52 35 C52 46 43 53 32 57 C21 53 12 46 12 35 L12 18 Z" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
        <circle cx="32" cy="32" r="10" fill="none" stroke="url(#g2)" stroke-width="1.5"/>
        <line x1="32" y1="22" x2="32" y2="17" stroke="#22d3ee" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="32" y1="42" x2="32" y2="47" stroke="#22d3ee" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="22" y1="32" x2="17" y2="32" stroke="#22d3ee" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="42" y1="32" x2="47" y2="32" stroke="#22d3ee" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="25" y1="25" x2="21" y2="21" stroke="#a855f7" stroke-width="1" stroke-linecap="round"/>
        <line x1="39" y1="39" x2="43" y2="43" stroke="#a855f7" stroke-width="1" stroke-linecap="round"/>
        <line x1="39" y1="25" x2="43" y2="21" stroke="#a855f7" stroke-width="1" stroke-linecap="round"/>
        <line x1="25" y1="39" x2="21" y2="43" stroke="#a855f7" stroke-width="1" stroke-linecap="round"/>
        <circle cx="32" cy="32" r="3.5" fill="white" opacity=".9"/>
      </svg>
      <div class="lp-brand">SENTRIX AI</div>
      <div class="lp-sub">Cyber Defense Platform</div>
    </div>

    {% if error %}
    <div class="lp-err">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="6.5" stroke="#f43f5e" stroke-width="1.4"/>
        <line x1="8" y1="5" x2="8" y2="9" stroke="#f43f5e" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="8" cy="11.5" r=".75" fill="#f43f5e"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" autocomplete="off">
      <div class="fl">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required autofocus>
      </div>
      <div class="fl">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="lp-btn">Sign In</button>
    </form>

    <div class="lp-creds">
      <div class="lp-cred">
        <span>admin / admin123</span>
        <span class="lp-badge lp-admin">Admin</span>
      </div>
      <div class="lp-cred">
        <span>analyst / analyst123</span>
        <span class="lp-badge lp-analyst">Analyst</span>
      </div>
      <div class="lp-cred">
        <span>viewer / viewer123</span>
        <span class="lp-badge lp-viewer">Viewer</span>
      </div>
    </div>
  </div>
</div>
<script src="/static/js/main.js"></script>
</body>
</html>
